name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # GHA 默认 ssh:// · 私有仓 ls-remote 撞 publickey 错
      # 重写为 https:// + GITHUB_TOKEN · same-owner 私有仓 read 默认有权
      - name: Configure git for private @akong/* deps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global url."https://oauth2:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://oauth2:${GH_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://oauth2:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - run: npm install
      - name: Type check
        run: npm run typecheck
      - name: Unit + Component tests
        run: npm test
